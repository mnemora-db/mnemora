name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  check-ci-success:
    name: Check CI Success
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed
        run: echo "CI workflow completed successfully. Proceeding with deployment."

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: check-ci-success
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad4ce5a8622924efc1d32dbc1 # v4.2.0

      - name: Set up Node.js 20
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.1
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python 3.12
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
        with:
          python-version: "3.12"

      - name: Cache Node modules (infra)
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4.1.2
        with:
          path: infra/node_modules
          key: ${{ runner.os }}-node-infra-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-infra-

      - name: Cache pip packages
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4.1.2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-deploy-${{ hashFiles('api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-deploy-

      - name: Install infra dependencies
        run: cd infra && npm ci

      - name: Install API dependencies (for Lambda bundling)
        run: cd api && pip install -r requirements.txt

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Synthesize CDK cloud assembly
        run: cd infra && npx cdk synth --quiet
        env:
          CI: "true"

      - name: Deploy CDK stacks to AWS
        run: cd infra && npx cdk deploy --all --require-approval broadening --ci
        env:
          CI: "true"

      - name: Output deployment status
        if: success()
        run: |
          echo "Deployment completed successfully"
          echo "Check CDK outputs:"
          cat infra/cdk-outputs.json || echo "No cdk-outputs.json found"
